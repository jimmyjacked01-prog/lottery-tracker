name: Daily Scraper

# Runs every day at 11:00 AM UTC (6:00 AM CDT). 
# Also allows you to click a button to run it manually.
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

# Grants permission for the bot to push the newly created index.html back to your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: pip install -r requirements.txt
      
    - name: Run Scraper
      run: python tracker.py
      
    - name: Commit and Push index.html
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add index.html
        git commit -m "Update tracker data" || exit 0
        git push
